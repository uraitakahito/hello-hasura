table:
  schema: public
  name: comments
object_relationships:
  - name: author
    using:
      foreign_key_constraint_on: user_id
  - name: post
    using:
      foreign_key_constraint_on: post_id
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - post_id
        - user_id
        - body
        - created_at
      filter:
        post:
          published:
            _eq: true
  - role: user
    permission:
      columns:
        - id
        - post_id
        - user_id
        - body
        - created_at
      filter: {}
insert_permissions:
  - role: user
    permission:
      columns:
        - post_id
        - body
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-user-id
update_permissions:
  - role: user
    permission:
      columns:
        - body
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: null
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id

table:
  schema: public
  name: users
array_relationships:
  - name: posts
    using:
      foreign_key_constraint_on:
        table:
          schema: public
          name: posts
        column: user_id
  - name: comments
    using:
      foreign_key_constraint_on:
        table:
          schema: public
          name: comments
        column: user_id
select_permissions:
  - role: anonymous
    permission:
      columns:
        - id
        - name
      filter: {}
  - role: user
    permission:
      columns:
        - id
        - name
        - email
        - created_at
      filter: {}
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - email
      filter:
        id:
          _eq: X-Hasura-User-Id
      check: null
